name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to energytrm.com
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, ctype, json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --no-progress

            echo "==> Installing Node dependencies & building assets..."
            npm ci
            npm run build

            echo "==> Running database migrations..."
            php artisan migrate --force

            echo "==> Caching configuration..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            echo "==> Restarting queue workers (if any)..."
            php artisan queue:restart 2>/dev/null || true

            echo "==> Done. Deployed successfully."
